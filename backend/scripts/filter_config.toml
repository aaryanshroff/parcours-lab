# ESCO Skills Filter Configuration

[filter]
# Hierarchy levels (1-indexed)
# 1 = Top categories         (S, K, T, L / 00, 01...)
# 2 = Broad categories       (S6, S1... / 001, 011...)
# 3 = Narrower categories    (S6.2... / 0011, 0111...)
# 4 = Specific categories    (S6.2.1...)
# 5 = Individual skills      (leaf nodes from skills_en.csv)

# Specific codes to exclude
exclude_codes = []

# Prefixes to exclude (filters out entire branches)
exclude_prefixes = [
    "S6",    # handling and moving (manual labor)
    "S7",    # constructing (carpentry, plumbing, welding, electrical)
    "S8",    # working with machinery and specialised equipment
    "S3.2",  # providing health care or medical treatments
    "S3.5",  # preparing and serving food and drinks
    "S3.6",  # providing general personal care (hair styling, childcare)
]

# Per-category level ranges [min, max]
# S = skills, K = knowledge, T = transversal, L = language
[filter.levels]
S = [4, 4]
K = [3, 3]

[output]
filename = "skill_groups_filtered.csv"
