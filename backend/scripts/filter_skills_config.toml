# Skill Filtering Configuration

# Minimum similarity score between skill and course topics (0.0 to 1.0)
# Higher = stricter, fewer skills retained
topic_similarity_threshold = 0.5

# Skill hierarchy code prefixes to exclude
# Any skill under these nodes (including the node itself) will be excluded
exclude_prefixes = [
    "S6",    # handling and moving (manual labor)
    "S7",    # constructing (carpentry, plumbing, welding, electrical)
    "S8",    # working with machinery and specialised equipment
    "S3.0",  # assisting and caring (generic)
    "S3.1",  # counselling (personal/family issues)
    "S3.5",  # preparing and serving food and drinks
    "S3.6",  # providing general personal care (hair styling, childcare)
]
